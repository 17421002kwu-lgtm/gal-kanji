            height: 45px;
            background-color: var(--primary);

        let appState = {
            wrongWords: {},
            currentMode: 'normal',
            currentQuizList: [],
            currentIndex: 0,
            currentWord: null
        };

        function loadData() {
            const saved = localStorage.getItem('gal_kanji_wrong_words');
            if (saved) {
                try {
                    appState.wrongWords = JSON.parse(saved);
                } catch(e) {
                    appState.wrongWords = {};
                }
            }
            updateHomeStats();
        }

        function saveData() {
            localStorage.setItem('gal_kanji_wrong_words', JSON.stringify(appState.wrongWords));
            updateHomeStats();
        }

        function updateHomeStats() {
            const count = Object.keys(appState.wrongWords).length;
            document.getElementById('home-total-count').innerText = count;
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById('result-overlay').style.display = 'none';
        }

        function goHome() {
            switchScreen('screen-home');
            updateHomeStats();
        }

        function startQuiz(mode) {
            appState.currentMode = mode;
            appState.currentIndex = 0;
            
            if (mode === 'normal') {
                document.getElementById('quiz-title').innerText = "ガチ勝負！通常クイズ";
                let shuffled = [...kanjiDataset].sort(() => 0.5 - Math.random());
                appState.currentQuizList = shuffled.slice(0, 10);
            } else {
                document.getElementById('quiz-title').innerText = "苦手克服🔥リベンジクイズ";
                const wrongKeys = Object.keys(appState.wrongWords);
                if (wrongKeys.length === 0) {
                    alert("あんにゃまる、まだ間違えた漢字がないよ！通常クイズで遊んでみてね😘");
                    return;
                }
                
                let list = [];
                wrongKeys.forEach(k => {
                    const found = kanjiDataset.find(d => d.k === k);
                    if (found) list.push(found);
                });
                
                appState.currentQuizList = list.sort(() => 0.5 - Math.random());
            }

            switchScreen('screen-quiz');
            showQuestion();
        }
