    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #ff007f;
            --secondary: #00f0ff;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: var(--card-bg); width: 100%; max-width: 400px; border-radius: 30px; border: 4px solid var(--primary); box-shadow: 0 0 20px var(--primary); padding: 25px; min-height: 600px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .header { text-align: center; margin-bottom: 25px; }
        
        /* 👇 ここ！消えちゃうネットの画像じゃなくて、CSS（コード）で直接ハートを描くから絶対安全！ */
        .heart-icon {
            display: inline-block;
            width: 70px;
            height: 70px;
            background-color: var(--primary);
            position: relative;
            transform: rotate(-45deg);
            margin: 20px auto 30px auto;
            filter: drop-shadow(0 0 15px var(--primary));
            animation: pulse 2s infinite;
        }
        .heart-icon::before, .heart-icon::after {
            content: "";
            width: 70px;
            height: 70px;
            background-color: var(--primary);
            border-radius: 50%;
            position: absolute;
        }
        .heart-icon::before { top: -35px; left: 0; }
        .heart-icon::after { top: 0; left: 35px; }

        @keyframes pulse { 0% { transform: scale(1) rotate(-45deg); } 50% { transform: scale(1.08) rotate(-45deg); } 100% { transform: scale(1) rotate(-45deg); } }
        
        .title { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); letter-spacing: 1px; }
        .welcome-msg { text-align: center; font-size: 18px; font-weight: bold; color: var(--secondary); text-shadow: 0 0 8px rgba(0,240,255,0.5); margin-bottom: 30px; line-height: 1.5; }
        .menu-btn { display: block; width: 100%; padding: 16px; margin-bottom: 15px; border: none; border-radius: 20px; font-size: 18px; font-weight: bold; color: #fff; cursor: pointer; transition: all 0.2s; text-align: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-main { background: linear-gradient(90deg, #ff007f, #ff66b2); box-shadow: 0 0 15px rgba(255,0,127,0.4); }
        .btn-main:active { transform: scale(0.97); filter: brightness(1.1); }
        .btn-sub { background: linear-gradient(90deg, #00f0ff, #70f5ff); color: #000; box-shadow: 0 0 15px rgba(0,240,255,0.3); }
        .btn-sub:active { transform: scale(0.97); filter: brightness(1.1); }
        .btn-dark { background: #2a2a2a; color: #eee; border: 1px solid #444; }
        .btn-dark:active { background: #333; }
        .stats { margin-top: auto; text-align: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; font-size: 14px; font-weight: bold; color: var(--text-muted); }
        .stats span { color: var(--primary); font-size: 18px; text-shadow: 0 0 5px var(--primary); }
        .screen { display: none; flex-direction: column; height: 100%; flex-grow: 1; }
        .screen.active { display: flex; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
        .quiz-box { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; min-height: 200px; }
        .question-kanji { font-size: 55px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); margin-bottom: 10px; }
        .question-context { font-size: 14px; color: var(--text-muted); margin-bottom: 5px; }
        .input-area { margin-bottom: 20px; }
        .kana-input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #444; background: #252525; color: #fff; font-size: 20px; text-align: center; font-weight: bold; }
        .kana-input:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 10px rgba(0,240,255,0.3); }
        .result-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 26px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; text-align: center; padding: 20px; }
        .result-mark { font-size: 80px; font-weight: 900; margin-bottom: 10px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .result-mark.correct { color: var(--secondary); text-shadow: 0 0 20px var(--secondary); }
        .result-mark.wrong { color: var(--primary); text-shadow: 0 0 20px var(--primary); }
        .result-details { font-size: 18px; margin-bottom: 30px; line-height: 1.6; }
        .result-details span { font-size: 24px; font-weight: bold; color: #fff; }
        .list-container { flex-grow: 1; overflow-y: auto; max-height: 400px; padding-right: 5px; margin-bottom: 15px; }
        .list-item { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 4px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .list-item.has-wrong { border-left-color: var(--primary); background: linear-gradient(90deg, rgba(255,0,127,0.05), transparent); }
        .list-kanji { font-size: 24px; font-weight: bold; }
        .list-reading { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
        .list-wrong-count { background: rgba(255,0,127,0.2); color: #ff66b2; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .empty-msg { text-align: center; color: var(--text-muted); margin-top: 40px; font-style: italic; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>

<body>

    <div class="container">
        <div id="screen-home" class="screen active">
            <div class="header">
                <div style="height: 110px; display: flex; align-items: center; justify-content: center;">
                    <div class="heart-icon"></div>
                </div>
                <h1 class="title">漢字爆アゲ単語帳</h1>
            </div>
            
            <div class="welcome-msg">
                あんにゃまる、おつ〜！🖤💗<br>今日も漢字アゲてこ？✨
            </div>

            <button class="menu-btn btn-main" onclick="startQuiz('normal')">ガチ勝負！通常クイズ</button>
            <button class="menu-btn btn-sub" onclick="startQuiz('revenge')">苦手克服🔥リベンジクイズ</button>
            <button class="menu-btn btn-dark" onclick="showListScreen()">ウチの単語帳を見る</button>

            <div class="stats">

            </div>
        </div>

        <div id="screen-quiz" class="screen">
            <button class="back-btn" onclick="goHome()">🏃‍♀️</button>
            <div class="header" style="margin-bottom: 10px;">
                <h2 class="title" id="quiz-title" style="font-size: 18px;">通常モード</h2>
            </div>
            
            <div class="quiz-box">
                <div id="quiz-loading" style="color: var(--text-muted);">読み込み中...</div>
                <div id="quiz-content" style="display:none; width:100%;">
                    <div class="question-context" id="q-context"></div>
                    <div class="question-kanji" id="q-kanji"></div>
                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom:15px;" id="q-hint"></div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="answer-input" class="kana-input" placeholder="ひらがなで入力してね！" autocomplete="off">
                <button class="menu-btn btn-main" style="margin-top: 15px; margin-bottom: 0;" onclick="checkAnswer()">これで勝負！</button>
            </div>

            <div id="result-overlay" class="result-overlay">
                <div id="result-mark" class="result-mark"></div>
                <div id="result-details" class="result-details"></div>
                <button class="menu-btn btn-sub" style="width: 80%; margin-bottom: 0;" id="result-next-btn" onclick="nextQuestion()">次へすすむ👉</button>
            </div>
        </div>

        <div id="screen-list" class="screen">
            <button class="back-btn" onclick="goHome()">🏃‍♀️</button>
            <div class="header">
                <h2 class="title" style="font-size: 20px;">ウチの単語帳一覧</h2>
            </div>
            
            <div class="list-container" id="list-container">
                </div>
            
            <button class="menu-btn btn-dark" style="margin-bottom: 0;" onclick="clearStorageWithConfirm()">データを初期化する</button>
        </div>
    </div>
